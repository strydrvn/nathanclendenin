<style>
:root {
  --bg: #090909;
  --surface: #111010;
  --text: #e2d9ce;
  --muted: #6b6258;
  --accent: #c8a97e;
  --line: #1c1b1a;
  --white: #f4ede4;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 40px;
  background: linear-gradient(to bottom, rgba(9,9,9,.95) 0%, transparent 100%);
  transition: background .4s;
}
nav.scrolled { background: rgba(9,9,9,.97); border-bottom: 1px solid var(--line); }
.nav-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 300; letter-spacing: .08em;
  color: var(--white); text-decoration: none;
}
.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a {
  font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); text-decoration: none; transition: color .2s;
}
.nav-links a:hover { color: var(--text); }
.config-btn {
  background: none; border: none; cursor: pointer;
  color: var(--muted); padding: 4px; display: flex; align-items: center;
  transition: color .2s;
}
.config-btn:hover { color: var(--accent); }
.config-btn svg { width: 14px; height: 14px; }

/* ── HERO ── */
.hero {
  position: relative; width: 100%; height: 100vh;
  display: flex; align-items: flex-end;
  overflow: hidden;
}
.hero-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  transition: opacity 1.2s ease, transform 8s ease-out;
  opacity: 0;
}
.hero:hover .hero-img { transform: scale(1.03); }

/* ── HERO ARROWS ── */
.hero-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 10; background: rgba(0,0,0,.25);
  border: 1px solid rgba(255,255,255,.15); border-radius: 50%;
  width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: rgba(255,255,255,.75);
  transition: background .2s, border-color .2s, color .2s;
}
.hero-arrow:hover { background: rgba(0,0,0,.5); color: #fff; border-color: rgba(255,255,255,.4); }
.hero-arrow svg { width: 20px; height: 20px; }
.hero-arrow-prev { left: 24px; }
.hero-arrow-next { right: 24px; }
.hero-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(
    to top,
    rgba(9,9,9,.9) 0%,
    rgba(9,9,9,.3) 40%,
    rgba(9,9,9,.1) 70%,
    transparent 100%
  );
}
.hero-text {
  position: relative; z-index: 2;
  padding: 0 40px 52px;
  max-width: 680px;
}
.hero-eyebrow {
  font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 14px;
  opacity: 0; animation: fadeUp .8s .3s forwards;
}
.hero-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(42px, 7vw, 80px);
  font-weight: 300; line-height: 1;
  color: var(--white); letter-spacing: -.02em;
  opacity: 0; animation: fadeUp .8s .5s forwards;
}
.hero-name em { font-style: italic; color: var(--accent); }
.hero-sub {
  margin-top: 14px;
  font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted); line-height: 2;
  opacity: 0; animation: fadeUp .8s .7s forwards;
}
.hero-caption {
  position: absolute; bottom: 52px; right: 40px;
  font-size: 10px; letter-spacing: .1em;
  color: rgba(255,255,255,.3); font-style: italic;
}
.scroll-hint {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  opacity: 0; animation: fadeIn 1s 1.2s forwards;
}
.scroll-hint span { font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
.scroll-line {
  width: 1px; height: 40px;
  background: linear-gradient(to bottom, var(--muted), transparent);
  animation: scrollPulse 2s 1.5s infinite;
}
@keyframes scrollPulse {
  0%,100% { opacity: .3; transform: scaleY(1); }
  50% { opacity: 1; transform: scaleY(1.2); }
}

/* ── NO-IMAGE HERO ── */
.hero-placeholder {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #0f0e0d 0%, #1a1714 50%, #0f0e0d 100%);
  display: flex; align-items: center; justify-content: center;
}
.hero-placeholder-text {
  font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--muted); text-align: center; line-height: 2;
}

/* ── ALBUMS SECTION ── */
.albums-section { padding: 80px 40px 120px; }
.section-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 48px; padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}
.section-label {
  font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted);
}
.section-count { font-size: 10px; color: var(--muted); letter-spacing: .1em; }

.albums-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 3px;
}
.album-card {
  position: relative; aspect-ratio: 4/3;
  overflow: hidden; cursor: pointer;
  background: var(--surface);
  text-decoration: none; display: block;
}

.album-thumb {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
  transition: transform .6s ease, filter .4s ease;
  filter: brightness(.85) saturate(.9);
}
.album-card:hover .album-thumb {
  transform: scale(1.05);
  filter: brightness(.95) saturate(1.05);
}
.album-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(9,9,9,.85) 0%, transparent 60%);
  opacity: 0; transition: opacity .4s;
}
.album-card:hover .album-overlay { opacity: 1; }
.album-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 24px 20px 20px;
  transform: translateY(8px); opacity: 0;
  transition: transform .4s, opacity .4s;
}
.album-card:hover .album-info { transform: translateY(0); opacity: 1; }
.album-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 300;
  color: var(--white); line-height: 1.2;
}

.album-meta {
  margin-top: 6px;
  font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--accent);
}
.album-placeholder {
  width: 100%; height: 100%;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
}
.album-placeholder-icon { color: var(--line); font-size: 32px; }

/* ── STATUS BANNER ── */
.status-banner {
  margin: 0 40px 40px;
  padding: 16px 20px;
  border: 1px solid #2a2218;
  border-radius: 4px;
  background: #1a140e;
  display: flex; align-items: center; gap: 12px;
  font-size: 11px; color: var(--accent);
}
.status-banner svg { width: 16px; height: 16px; flex-shrink: 0; }

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--line);
  padding: 32px 40px;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 16px;
}
.footer-copy { font-size: 10px; letter-spacing: .1em; color: var(--muted); }
.social-links { display: flex; gap: 24px; }
.social-links a {
  font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted); text-decoration: none; transition: color .2s;
}
.social-links a:hover { color: var(--accent); }

/* ── CONFIG OVERLAY ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.8);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.config-panel {
  background: #141312; border: 1px solid var(--line);
  border-radius: 8px; padding: 32px; width: 90%; max-width: 480px;
  transform: translateY(16px); transition: transform .3s;
}
.overlay.open .config-panel { transform: translateY(0); }
.config-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px; font-weight: 300; color: var(--white);
  margin-bottom: 8px;
}
.config-sub { font-size: 10px; color: var(--muted); line-height: 1.8; margin-bottom: 24px; letter-spacing: .05em; }
.config-label { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }
.config-input {
  width: 100%; background: #0d0c0b; border: 1px solid var(--line);
  border-radius: 4px; padding: 10px 14px;
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--text); outline: none; transition: border-color .2s;
}
.config-input:focus { border-color: var(--accent); }
.config-note { font-size: 10px; color: var(--muted); margin-top: 6px; line-height: 1.7; }
.config-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-save {
  flex: 1; background: var(--accent); color: #0a0a0a;
  border: none; border-radius: 4px; padding: 10px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
  transition: background .2s;
}
.btn-save:hover { background: #d4b98e; }
.btn-cancel {
  background: transparent; color: var(--muted);
  border: 1px solid var(--line); border-radius: 4px; padding: 10px 16px;
  font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer;
  transition: color .2s;
}
.btn-cancel:hover { color: var(--text); }

/* ── LOADING ── */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, #1a1917 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── ANIMATIONS ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:.6; } }

/* ── PROMO SECTION ── */
.promo-section { padding-bottom: 80px; background: var(--surface); margin-top: 80px; }
.promo-divider {
  display: flex; align-items: center; gap: 20px;
  padding: 52px 40px 40px;
}
.promo-divider-line { flex: 1; height: 1px; background: var(--line); }
.promo-divider-label {
  font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
  color: var(--muted); white-space: nowrap;
}
.promo-list { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 0 40px; align-items: start; }
.promo-desc.expanded { display: block; -webkit-line-clamp: unset; overflow: visible; }
.promo-read-more {
  display: inline-block; margin-top: 8px;
  font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
  color: var(--accent); cursor: pointer; transition: color .2s;
  user-select: none;
}
.promo-read-more:hover { color: var(--white); }
.promo-card {
  display: flex; align-items: stretch; text-decoration: none; color: inherit;
  background: #181614; min-height: 180px; transition: background .25s;
}
.promo-card:hover { background: #1e1c1a; }
.promo-image { flex: 0 0 180px; position: relative; overflow: hidden; }
.promo-image img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  object-position: var(--cover-position, center);
  transition: transform .6s ease; filter: brightness(.9) saturate(.9);
}
.promo-card:hover .promo-image img { transform: scale(1.04); filter: brightness(.95) saturate(1); }
.promo-image-placeholder {
  flex: 0 0 180px; background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; border-right: 1px solid var(--line);
}
.promo-body {
  flex: 1; padding: 28px 32px;
  display: flex; flex-direction: column; justify-content: space-between;
  border-left: 1px solid var(--line);
}
.promo-eyebrow {
  font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 10px;
}
.promo-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px; font-weight: 300; color: var(--white);
  line-height: 1.15; letter-spacing: -.01em; margin-bottom: 12px;
}
.promo-desc {
  font-size: 11px; line-height: 1.8; color: var(--muted);
  display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
  overflow: hidden;
}
.promo-link {
  margin-top: 20px; display: inline-flex; align-items: center; gap: 7px;
  font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--accent); transition: color .2s;
}
.promo-card:hover .promo-link { color: var(--white); }
.promo-link svg { width: 12px; height: 12px; transition: transform .2s; }
.promo-card:hover .promo-link svg { transform: translate(2px, -2px); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  nav { padding: 18px 20px; }
  .nav-links { gap: 16px; }
  .nav-links a:not(:last-child) { display: none; }
  .hero-text { padding: 0 20px 44px; }
  .hero-arrow { width: 40px; height: 40px; }
  .hero-arrow-prev { left: 12px; }
  .hero-arrow-next { right: 12px; }
  .albums-section { padding: 60px 20px 80px; }
  .albums-grid { grid-template-columns: 1fr 1fr; gap: 2px; }

  .album-info { opacity: 1; transform: none; }
  .album-overlay { opacity: 1; }
  footer { padding: 24px 20px; }
  .status-banner { margin: 0 20px 32px; }
  .promo-list { padding: 0 20px; grid-template-columns: 1fr; }
  .promo-divider { padding: 40px 20px 32px; }
  .promo-card { flex-direction: column; min-height: auto; }
  .promo-image { flex: 0 0 auto; height: 180px; }
  .promo-image-placeholder { flex: 0 0 auto; height: 140px; border-right: none; border-bottom: 1px solid var(--line); }
  .promo-body { border-left: none; border-top: 1px solid var(--line); padding: 20px; }
  .promo-title { font-size: 22px; }
}

/* ══ LIGHT MODE ══════════════════════════════════════════════════════ */
@media (prefers-color-scheme: light) {
  :root {
    --bg:      #f8f6f2;
    --surface: #f0ece6;
    --text:    #1a1714;
    --muted:   #8a7e74;
    --line:    #d4ccc4;
    --card:    #ffffff;
    --white:   #1a1714;
    --shadow:  0 1px 3px rgba(26,23,20,.09), 0 4px 16px rgba(26,23,20,.07);
  }

  /* ── NAV — warm off-white, dark text ── */
  nav {
    background: linear-gradient(to bottom, rgba(240,236,230,.97) 0%, transparent 100%);
  }
  nav.scrolled {
    background: rgba(240,236,230,.98);
    border-bottom-color: var(--line);
  }
  .nav-title      { color: #1a1714; }
  .nav-links a    { color: var(--muted); }
  .nav-links a:hover { color: #1a1714; }
  .config-btn     { color: var(--muted); }
  .config-btn:hover { color: var(--accent); }

  /* ── HERO — always white text (dark gradient is always on) ── */
  .hero-name    { color: #f4ede4; text-shadow: 0 2px 24px rgba(0,0,0,.7), 0 1px 6px rgba(0,0,0,.5); }
  .hero-name em { color: var(--accent); }
  .hero-eyebrow { color: var(--accent); text-shadow: 0 1px 8px rgba(0,0,0,.6); }
  .hero-sub     { color: rgba(235,225,210,.85); text-shadow: 0 1px 8px rgba(0,0,0,.6); }
  .hero-caption { color: rgba(235,225,210,.45); }

  /* ── ALBUM HOVER — white text on dark overlay in both modes ── */
  .album-title { color: #f4ede4; text-shadow: 0 1px 8px rgba(0,0,0,.5); }
  .album-meta  { color: var(--accent); }

  /* ── SCROLL HINT ── */
  .scroll-hint span { color: var(--muted); }

  /* ── ALBUM GRID — readable overlay, still airy ── */
  .album-overlay {
    background: linear-gradient(to top, rgba(10,8,6,.75) 0%, rgba(10,8,6,.1) 60%, transparent 100%);
  }
  .album-info .album-title { text-shadow: 0 1px 4px rgba(0,0,0,.5); }
  .album-thumb { filter: brightness(.92) saturate(.95); }
  .album-card:hover .album-thumb { filter: brightness(1) saturate(1.05); }

  /* ── SECTION HEADER ── */
  .section-label { color: var(--muted); }

  /* ── STATUS BANNER ── */
  .status-banner {
    background: #fdf8f2;
    border-color: #e8d8c4;
    color: #7a5c2e;
  }

  /* ── PROMO — horizontal card light mode ── */
  .promo-section { background: var(--surface); }
  .promo-card { background: #ffffff; }
  .promo-card:hover { background: var(--bg); }
  .promo-title { color: #1a1714; }
  .promo-image img { filter: brightness(.95) saturate(.95); }
  .promo-card:hover .promo-image img { filter: brightness(1) saturate(1.05); }

  /* ── FOOTER ── */
  footer { background: var(--bg); border-top-color: var(--line); }
  .footer-copy { color: var(--muted); }
  .social-links a { color: var(--muted); }
  .social-links a:hover { color: var(--accent); }

  /* ── CONFIG PANEL ── */
  .config-panel {
    background: #ffffff;
    border-color: var(--line);
  }
  .config-title { color: #1a1714; }
  .config-sub   { color: var(--muted); }
  .config-input {
    background: var(--surface);
    border-color: var(--line);
    color: var(--text);
  }
  .btn-cancel {
    background: var(--surface);
    color: var(--text);
    border-color: var(--line);
  }
}
</style>
</head>
<body>

<nav id="nav">
  <a href="/" class="nav-title">Nathan Clendenin</a>
  <div class="nav-links">
    <a href="#albums">Work</a>
    <a href="bio.html">Bio</a>

  </div>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-placeholder" id="heroPlaceholder">
    <div class="hero-placeholder-text">
      Add your R2 URL in Settings ⚙<br>to load your hero image
    </div>
  </div>
  <img class="hero-img" id="heroImg0" alt="">
  <img class="hero-img" id="heroImg1" alt="">
  <button class="hero-arrow hero-arrow-prev" id="heroPrev" onclick="heroNav(-1)" aria-label="Previous photo" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <button class="hero-arrow hero-arrow-next" id="heroNext" onclick="heroNav(1)" aria-label="Next photo" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
  </button>
  <div class="hero-gradient"></div>
  <div class="hero-text">
    <div class="hero-eyebrow">Portfolio</div>
    <h1 class="hero-name">Nathan <em>Clendenin</em></h1>
    <p class="hero-sub" id="heroSub">Photojournalist · Storyteller · Entrepreneur</p>
  </div>
  <p class="hero-caption" id="heroCaption"></p>
  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>
</section>

<!-- ALBUMS -->
<section class="albums-section" id="albums">
  <div class="status-banner" id="statusBanner" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="statusMsg"></span>
  </div>
  <div class="section-header">
    <span class="section-label">Albums</span>
    <span class="section-count" id="albumCount"></span>
  </div>
  <div class="albums-grid" id="albumsGrid">
    <!-- populated by JS -->
  </div>
</section>

<!-- PROMO SECTION -->
<section class="promo-section" id="promoSection" style="display:none">
  <div class="promo-divider">
    <div class="promo-divider-line"></div>
    <span class="promo-divider-label">More from Nathan Clendenin</span>
    <div class="promo-divider-line"></div>
  </div>
  <div class="promo-list" id="promoGrid"></div>
</section>

<footer>
  <p class="footer-copy" id="footerCopy">© Nathan Clendenin</p>
  <div class="social-links" id="socialLinks"></div>
</footer>

  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────
const API_URL = 'https://api.nathanclendenin.com';
const R2_URL  = 'https://images.nathanclendenin.com';

function getApiUrl() { return API_URL; }
function getR2Url()  { return R2_URL; }

// ── NAV SCROLL ─────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 80);
});

// ── LOAD SITE ──────────────────────────────────────────────────────
async function loadSite() {
  const api = getApiUrl();
  const r2  = getR2Url(); // kept for future use; image URLs now come from Worker

  if (!api) {
    showStatus('Open Settings ⚙ in the top-right to enter your Worker API URL, then your photos will appear here.');
    renderSkeletons(6);
    return;
  }

  try {
    const res = await fetch(`${api}/manifest.json`, { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderSite(r2, data);
  } catch (e) {
    showStatus(`Could not reach the manifest Worker at ${api} — check Settings. Make sure the Worker is deployed and the R2 binding is set. (${e.message})`);
    renderSkeletons(4);
  }
}

function showStatus(msg) {
  const banner = document.getElementById('statusBanner');
  document.getElementById('statusMsg').textContent = msg;
  banner.style.display = 'flex';
}

function renderSite(r2, data) {
  document.getElementById('statusBanner').style.display = 'none';

  // HERO
  if (data.hero) renderHero(data.hero);

  // SITE META
  if (data.site) {
    document.title = data.site.title || 'Nathan Clendenin';
    if (data.site.subtitle) {
      document.getElementById('heroSub').textContent = data.site.subtitle;
    }
    if (data.site.bio) {
      document.getElementById('footerCopy').textContent = `Soli Deo Gloria · © ${data.site.title}`;
    }
    // SOCIAL
    if (data.site.social) {
      const links = [];
      if (data.site.social.instagram) links.push(`<a href="https://instagram.com/${data.site.social.instagram}" target="_blank" rel="noopener">Instagram</a>`);
      if (data.site.social.linkedin)  links.push(`<a href="https://linkedin.com/in/${data.site.social.linkedin}" target="_blank" rel="noopener">LinkedIn</a>`);
      document.getElementById('socialLinks').innerHTML = links.join('');
    }
  }

  // ALBUMS
  const albums = data.albums || [];
  document.getElementById('albumCount').textContent = `${albums.length} album${albums.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('albumsGrid');
  grid.innerHTML = '';

  albums.forEach((album, idx) => {
    const a = document.createElement('a');
    a.className = 'album-card';
    // Collections link to collection page; albums link to album page
    a.href = album.type === 'collection'
      ? `collection.html?id=${album.id}`
      : `album.html?album=${encodeURIComponent(album.id)}`;

    const countLabel = album.type === 'collection'
      ? (album.count ? `${album.count} album${album.count !== 1 ? 's' : ''}` : null)
      : (album.count ? `${album.count} photos` : null);
    const metaParts = [album.year, countLabel].filter(Boolean);
    const loading = idx < 3 ? 'eager' : 'lazy';

    // cover is now { thumb, medium } from Worker — already sized by CF Image Resizing
    const coverHtml = album.cover
      ? `<img class="album-thumb"
              src="${album.cover.thumb}"
              srcset="${album.cover.thumb} 600w, ${album.cover.medium} 1200w"
              sizes="(max-width: 600px) 100vw, 50vw"
              alt="${album.title}"
              loading="${loading}">`
      : `<div class="album-placeholder"><div class="album-placeholder-icon">📷</div></div>`;

    a.innerHTML = `
      ${coverHtml}
      <div class="album-overlay"></div>
      <div class="album-info">
        <div class="album-title">${album.title}</div>
        ${metaParts.length ? `<div class="album-meta">${metaParts.join(' · ')}</div>` : ''}
      </div>
    `;
    grid.appendChild(a);
  });
}

function renderSkeletons(n) {
  const grid = document.getElementById('albumsGrid');
  grid.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const div = document.createElement('div');
    div.className = 'album-card skeleton';
    grid.appendChild(div);
  }
}

// ── HERO SLIDESHOW ─────────────────────────────────────────────────
let heroSlides = [], heroIdx = 0, heroTimer = null, heroActive = 0;

function renderHero(heroData) {
  heroSlides = heroData.slides || (heroData.url ? [{ url: heroData.url, caption: heroData.caption }] : []);
  if (!heroSlides.length) return;

  document.getElementById('heroPlaceholder').style.display = 'none';

  // Show arrows only when there are multiple slides
  if (heroSlides.length > 1) {
    document.getElementById('heroPrev').style.display = 'flex';
    document.getElementById('heroNext').style.display = 'flex';
    heroPreload(1);
    heroStartTimer();
  }

  heroShowSlide(0, true);
}

function heroShowSlide(idx, instant) {
  heroIdx = ((idx % heroSlides.length) + heroSlides.length) % heroSlides.length;
  const slide  = heroSlides[heroIdx];
  const next   = 1 - heroActive;
  const nextEl = document.getElementById(`heroImg${next}`);
  const currEl = document.getElementById(`heroImg${heroActive}`);

  nextEl.alt = slide.caption || '';

  const swap = () => {
    if (instant) {
      // First load: skip fade transition
      nextEl.style.transition = 'none';
      currEl.style.transition = 'none';
    }
    nextEl.style.opacity = '1';
    currEl.style.opacity = '0';
    heroActive = next;
    document.getElementById('heroCaption').textContent = slide.caption || '';
    if (instant) {
      // Re-enable transitions after browser paints
      requestAnimationFrame(() => requestAnimationFrame(() => {
        nextEl.style.transition = '';
        currEl.style.transition = '';
      }));
    } else {
      heroPreload(heroIdx + 1);
    }
  };

  nextEl.onload = swap;
  nextEl.src = slide.url;
  if (nextEl.complete) { nextEl.onload = null; swap(); }
}

function heroNav(dir) {
  clearInterval(heroTimer);
  heroShowSlide(heroIdx + dir, false);
  heroStartTimer();
}

function heroStartTimer() {
  clearInterval(heroTimer);
  heroTimer = setInterval(() => heroShowSlide(heroIdx + 1, false), 5000);
}

function heroPreload(idx) {
  const slide = heroSlides[((idx % heroSlides.length) + heroSlides.length) % heroSlides.length];
  if (!slide) return;
  const img = new Image();
  img.src = slide.url;
}

// Keyboard navigation for hero slideshow
document.addEventListener('keydown', e => {
  if (heroSlides.length < 2) return;
  if (e.key === 'ArrowLeft')  heroNav(-1);
  if (e.key === 'ArrowRight') heroNav(1);
});

// ── PROMO ──────────────────────────────────────────────────────────
async function loadPromo() {
  try {
    const res = await fetch(`${getApiUrl()}/promo`, { cache: 'no-cache' });
    if (!res.ok) return;
    const data = await res.json();
    renderPromo(data.items || []);
  } catch(e) { /* non-essential — fail silently */ }
}

function renderPromo(items) {
  if (!items.length) return;
  const section = document.getElementById('promoSection');
  const grid    = document.getElementById('promoGrid');

  items.forEach(item => {
    if (!item.url) return;
    const a = document.createElement('a');
    a.className = 'promo-card';
    a.href = item.url; a.target = '_blank'; a.rel = 'noopener noreferrer';

    let domain = '';
    try { domain = new URL(item.url).hostname.replace(/^www\./, ''); } catch(e) {}
    const pos = item.coverPosition || 'center';

    const coverHtml = item.cover
      ? `<div class="promo-image" style="--cover-position:${pos}">
           <img src="${item.cover.thumb}"
                srcset="${item.cover.thumb} 600w, ${item.cover.medium} 1200w"
                sizes="30vw" alt="${item.title}">
         </div>`
      : `<div class="promo-image-placeholder">🔗</div>`;

    a.innerHTML = `${coverHtml}
      <div class="promo-body">
        <div>
          ${item.year ? `<div class="promo-eyebrow">${item.year}</div>` : ''}
          <div class="promo-title">${item.title}</div>
          ${item.description ? `<p class="promo-desc">${item.description}</p><span class="promo-read-more" onclick="event.preventDefault();event.stopPropagation();var d=this.previousElementSibling;d.classList.toggle('expanded');this.textContent=d.classList.contains('expanded')?'Read less ↑':'Read more ↓'">Read more ↓</span>` : ''}
        </div>
        <div class="promo-link">
          Visit${domain ? ` → ${domain}` : ''}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M7 17L17 7M17 7H7M17 7v10"/>
          </svg>
        </div>
      </div>`;

    grid.appendChild(a);
  });

  section.style.display = 'block';
  // Hide "Read more" on cards whose description isn't actually clamped
  requestAnimationFrame(() => {
    section.querySelectorAll('.promo-read-more').forEach(btn => {
      const desc = btn.previousElementSibling;
      if (desc && desc.scrollHeight <= desc.clientHeight + 2) btn.style.display = 'none';
    });
  });
}

// ── INIT ───────────────────────────────────────────────────────────
loadSite();
loadPromo();
</script>
</body>
</html>
